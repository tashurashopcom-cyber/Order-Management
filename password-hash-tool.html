<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Hash Generator (Admin Only)</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #f4f5f8;
        margin: 0;
        padding: 30px 15px;
        display: flex;
        justify-content: center;
    }
    .box {
        background: #fff;
        max-width: 420px;
        width: 100%;
        border-radius: 16px;
        padding: 28px 24px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }
    h2 { margin: 0 0 4px; color: #c62828; font-size: 20px; }
    p.subtitle { margin: 0 0 22px; color: #888; font-size: 13px; }
    label { font-size: 13px; font-weight: 700; color: #444; display: block; margin-bottom: 6px; }
    input {
        width: 100%; box-sizing: border-box; padding: 12px 14px;
        border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #c62828; }
    button {
        width: 100%; padding: 13px; background: #c62828; color: #fff;
        border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #b71c1c; }
    .result {
        margin-top: 20px; background: #f9f9f9; border: 1px dashed #c62828;
        border-radius: 10px; padding: 14px; display: none; word-break: break-all;
        font-family: monospace; font-size: 13px; color: #333; position: relative;
    }
    .result.show { display: block; }
    .copy-btn {
        margin-top: 10px; width: 100%; background: #333; padding: 10px;
        border-radius: 8px; font-size: 13px;
    }
    .copy-btn.copied { background: #2e7d32; }
    .note {
        margin-top: 18px; font-size: 12px; color: #999; text-align: center; line-height: 1.6;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Password Hash Generator</h2>
    <p class="subtitle">শুধু তোমার নিজের ব্যবহারের জন্য — কাস্টমারের কাছে এই লিংক দেবে না</p>

    <label>নতুন পাসওয়ার্ড লিখো</label>
    <input type="text" id="pwInput" placeholder="যেমন: 1234">

    <button onclick="generateHash()">Hash তৈরি করো</button>

    <div class="result" id="resultBox">
        <div id="hashOutput"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyHash()">কপি করো</button>
    </div>

    <p class="note">
        এই hash কোডটা কপি করে তোমার Google Sheet-এ ওই কাস্টমারের row-এর
        <strong>PasswordHash</strong> কলামে (D কলাম) বসিয়ে দাও। তারপর কাস্টমারকে
        নতুন পাসওয়ার্ডটা (যেটা তুমি এখানে টাইপ করেছিলে) জানিয়ে দাও।
    </p>
</div>

<script>
async function generateHash() {
    const pw = document.getElementById('pwInput').value;
    if (!pw) {
        alert('একটা পাসওয়ার্ড লিখো');
        return;
    }
    const enc = new TextEncoder().encode(pw);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');

    document.getElementById('hashOutput').innerText = hash;
    document.getElementById('resultBox').classList.add('show');
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('copyBtn').innerText = 'কপি করো';
}

function copyHash() {
    const hash = document.getElementById('hashOutput').innerText;
    navigator.clipboard.writeText(hash).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerText = 'কপি হয়েছে ✓';
        btn.classList.add('copied');
    });
}
</script>

</body>
</html>
