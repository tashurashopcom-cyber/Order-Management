<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - স্ট্যাটাস আপডেট</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(160deg, #f4f7f6 0%, #eef3f1 100%);
            padding: 15px;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
        }

        .admin-container {
            width: 100%;
            max-width: 480px;
            margin: 20px auto;
            padding: 28px 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .admin-container h2 {
            margin-bottom: 22px;
            font-size: 20px;
            color: #222;
            font-weight: 700;
            text-align: center;
        }

        .search-box { display: flex; gap: 10px; margin-bottom: 18px; }
        .search-box input {
            flex: 1 1 auto; min-width: 0; height: 48px; padding: 10px 14px;
            border: 1.5px solid #dadfe2; border-radius: 8px; font-size: 14px; outline: none;
            transition: border-color 0.25s;
        }
        .search-box input:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40,167,69,0.12); }
        .search-box button {
            flex: 0 0 auto; height: 48px; padding: 0 18px; background: #28a745; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700;
        }
        .search-box button:hover { background: #218838; }

        .loading-text { color: #777; font-style: italic; font-size: 13.5px; margin-bottom: 14px; text-align: center; }

        .order-info-card {
            background: #f9fbfa; border: 1px solid #eef0ef; border-radius: 12px;
            padding: 14px 16px; margin-bottom: 18px;
        }
        .order-info-card h4 { font-size: 14px; color: #333; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 5px 0; border-bottom: 1px dashed #eee; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; flex-shrink: 0; }
        .info-value { color: #222; font-weight: 600; text-align: right; word-break: break-word; }

        .delivery-type-badge {
            display: inline-block; margin-top: 8px; padding: 4px 10px; border-radius: 20px;
            font-size: 11.5px; font-weight: 700; background: #eef3ff; color: #3f51b5;
        }
        .delivery-type-badge.road { background: #fff4e5; color: #b3760c; }

        .section-label { font-size: 13px; font-weight: 700; color: #444; margin: 4px 0 10px; }

        .status-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .status-btn {
            flex: 1 1 auto; min-width: 110px; padding: 10px 8px; border-radius: 10px;
            border: 1.5px solid #dadfe2; background: #f9f9f9; color: #444;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .status-btn.selected {
            background: linear-gradient(135deg, #28a745, #34c759); border-color: #28a745; color: #fff;
            box-shadow: 0 4px 10px rgba(40,167,69,0.25);
        }
        .status-btn.current { border-color: #28a745; color: #28a745; }
        .status-btn.current::after { content: ' (বর্তমান)'; font-size: 10.5px; }

        .cancel-btn-row { margin-top: 4px; }
        .cancel-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid #ffd9d9;
            background: #fff5f5; color: #c92a2a; font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .cancel-btn.selected { background: #c92a2a; color: #fff; border-color: #c92a2a; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
        .input-group textarea {
            width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; background: #f9f9f9; resize: vertical; min-height: 60px; font-family: inherit;
        }
        .input-group textarea:focus { outline: none; border-color: #28a745; background: #fff; }

        .confirm-btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #28a745, #34c759); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .confirm-btn:disabled { background: #c8e6cf; cursor: not-allowed; }

        .hint-text { font-size: 11.5px; color: #999; margin: -8px 0 16px; line-height: 1.4; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background-color: #323232; color: #fff; padding: 14px 22px; border-radius: 10px;
            display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500;
            z-index: 999; box-shadow: 0 6px 20px rgba(0,0,0,0.25); opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s ease; max-width: 90%; text-align: left;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .toast.error { background-color: #c92a2a; }

        .scan-btn {
            flex: 0 0 auto; height: 48px; width: 48px; padding: 0; background: #3f51b5; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .scan-btn:hover { background: #32408f; }

        .scanner-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .scanner-modal.show { display: flex; }
        .scanner-box {
            width: 78vw; max-width: 260px; aspect-ratio: 1/1; border-radius: 16px;
            overflow: hidden; position: relative; background: #000;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.25), 0 0 0 9999px rgba(0,0,0,0.92);
        }
        .scanner-box video, .scanner-box canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        .scanner-guide-line {
            position: absolute; left: 8%; right: 8%; top: 50%; height: 2px;
            background: #ff3b30; box-shadow: 0 0 8px #ff3b30; animation: scanline 1.6s ease-in-out infinite;
        }
        @keyframes scanline { 0%,100% { top: 30%; } 50% { top: 70%; } }
        .scanner-hint { color: #eee; font-size: 13.5px; margin-top: 16px; text-align: center; }
        .scanner-close-btn {
            margin-top: 14px; padding: 10px 22px; border-radius: 24px; border: none;
            background: #fff; color: #222; font-weight: 700; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h2><i class="fas fa-user-shield"></i> অর্ডার স্ট্যাটাস আপডেট</h2>

    <div class="search-box">
        <input type="text" id="orderInput" placeholder="অর্ডার আইডি (যেমন: KST1001)">
        <button type="button" class="scan-btn" onclick="openScanner()" title="বারকোড স্ক্যান করুন"><i class="fas fa-barcode"></i></button>
        <button onclick="searchOrder()">Search</button>
    </div>

    <p id="loadingMsg" class="loading-text" style="display:none;">খোঁজা হচ্ছে, অপেক্ষা করুন...</p>

    <div id="orderInfoCard" class="order-info-card" style="display:none;">
        <h4><i class="fas fa-receipt"></i> অর্ডার তথ্য</h4>
        <div class="info-row"><span class="info-label">অর্ডার আইডি</span><span class="info-value" id="infoOrderId">-</span></div>
        <div class="info-row"><span class="info-label">নাম</span><span class="info-value" id="infoName">-</span></div>
        <div class="info-row"><span class="info-label">মোবাইল</span><span class="info-value" id="infoMobile">-</span></div>
        <div class="info-row"><span class="info-label">ঠিকানা</span><span class="info-value" id="infoAddress">-</span></div>
        <div class="info-row"><span class="info-label">বর্তমান স্ট্যাটাস</span><span class="info-value" id="infoStatus">-</span></div>
        <div id="deliveryTypeBadgeWrap"></div>
    </div>

    <div id="updateSection" style="display:none;">
        <p class="section-label">নতুন স্ট্যাটাস সিলেক্ট করুন</p>
        <div class="status-buttons" id="statusButtons"></div>

        <div class="cancel-btn-row">
            <button class="cancel-btn" id="cancelBtn" onclick="selectCancel()">❌ অর্ডার ক্যানসেল করুন</button>
        </div>

        <div class="input-group" style="margin-top:18px;">
            <label id="noteLabel">অপশনাল নোট</label>
            <textarea id="noteInput" placeholder="যেমন: ঢাকা হাব থেকে বের হয়েছে (ঐচ্ছিক)"></textarea>
        </div>
        <p class="hint-text" id="noteHint">তারিখ ও সময় অটোমেটিক যুক্ত হয়ে যাবে, আলাদা করে লিখতে হবে না।</p>

        <button class="confirm-btn" id="confirmBtn" onclick="confirmUpdate()" disabled>আপডেট কনফার্ম করুন</button>
    </div>
</div>

<div id="scannerModal" class="scanner-modal">
    <div class="scanner-box" id="scannerBox">
        <div class="scanner-guide-line"></div>
    </div>
    <p class="scanner-hint">বারকোডটি ক্যামেরার সামনে সোজা করে ধরুন</p>
    <button class="scanner-close-btn" onclick="closeScanner()">✕ বন্ধ করুন</button>
</div>

<div id="toastNotification" class="toast">
    <span id="toastIcon">✓</span>
    <span id="toastMessage"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
    // ⚠️ আপনার SheetDB API URL
    const sheetdbAPI = "https://sheetdb.io/api/v1/g5k93bim98aob";

    // হোম ডেলিভারির জন্য সব স্ট্যাটাস অপশন
    const HOME_STATUSES = [
        { key: 'Pending',    label: 'Pending' },
        { key: 'Processing', label: 'Processing' },
        { key: 'Shipped',    label: 'Shipped' },
        { key: 'In Division',label: 'In Division' },
        { key: 'In District',label: 'In District' },
        { key: 'With Rider', label: 'Out for Delivery' },
        { key: 'Delivered',  label: 'Delivered' }
    ];
    // রোড রিসিভ ডেলিভারির জন্য (ডিভিশন/ডিস্ট্রিক্ট স্কিপ)
    const ROAD_STATUSES = [
        { key: 'Pending',    label: 'Pending' },
        { key: 'Processing', label: 'Processing' },
        { key: 'Shipped',    label: 'Shipped' },
        { key: 'With Rider', label: 'Out for Delivery' },
        { key: 'Delivered',  label: 'Delivered' }
    ];

    let currentOrder = null;
    let selectedStatusKey = null;
    let isCancelSelected = false;
    let scannerActive = false;

    function isRoadReceiveAddress(address) {
        return (address || "").includes("রোড রিসিভ ডেলিভারি");
    }

    // ===== বারকোড স্ক্যানার (Code 128, alphanumeric) =====
    function openScanner() {
        const modal = document.getElementById('scannerModal');
        const box = document.getElementById('scannerBox');

        modal.classList.add('show');

        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: box,
                constraints: {
                    facingMode: "environment",
                    width: { min: 640 },
                    height: { min: 480 }
                }
            },
            locator: { patchSize: "medium", halfSample: true },
            numOfWorkers: navigator.hardwareConcurrency ? Math.min(4, navigator.hardwareConcurrency) : 2,
            frequency: 10,
            decoder: {
                readers: ["code_128_reader"] // আলফা-নিউমেরিক Code128 বারকোড
            },
            locate: true
        }, function (err) {
            if (err) {
                console.error(err);
                showToast("ক্যামেরা চালু করতে সমস্যা হয়েছে। পারমিশন দেখুন।", "error");
                closeScanner();
                return;
            }
            scannerActive = true;
            Quagga.start();
        });

        Quagga.onDetected(handleBarcodeDetected);
    }

    function handleBarcodeDetected(result) {
        const code = result && result.codeResult ? result.codeResult.code : null;
        if (!code || !scannerActive) return;

        playBeep();
        closeScanner();

        document.getElementById('orderInput').value = code;
        searchOrder();
    }

    function closeScanner() {
        const modal = document.getElementById('scannerModal');
        modal.classList.remove('show');
        scannerActive = false;
        try {
            Quagga.offDetected(handleBarcodeDetected);
            Quagga.stop();
        } catch (e) {
            // স্ক্যানার আগেই বন্ধ থাকলে এরর এড়িয়ে যাওয়া হচ্ছে
        }
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 1000;
            gain.gain.value = 0.25;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            setTimeout(() => {
                osc.stop();
                ctx.close();
            }, 150);
        } catch (e) {
            console.warn("Beep failed:", e);
        }
    }
    // ===== বারকোড স্ক্যানার শেষ =====

    function searchOrder() {
        const orderId = document.getElementById('orderInput').value.trim();
        if (orderId === "") {
            showToast("দয়া করে অর্ডার আইডি দিন!", "error");
            return;
        }

        resetUI();
        document.getElementById('loadingMsg').style.display = 'block';

        const sheetdbUrl = `${sheetdbAPI}/search?${new URLSearchParams({'Order ID': orderId})}`;

        fetch(sheetdbUrl)
            .then(res => {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(data => {
                document.getElementById('loadingMsg').style.display = 'none';
                if (data.length === 0) {
                    showToast("এই আইডি দিয়ে কোনো অর্ডার পাওয়া যায়নি।", "error");
                    return;
                }
                currentOrder = data[0];
                renderOrderInfo(currentOrder);
                renderStatusButtons(currentOrder);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingMsg').style.display = 'none';
                showToast("সার্ভার এরর! আবার চেষ্টা করুন।", "error");
            });
    }

    function renderOrderInfo(order) {
        document.getElementById('infoOrderId').innerText = order["Order ID"] || "-";
        document.getElementById('infoName').innerText = order.Name || "-";
        document.getElementById('infoMobile').innerText = order.Mobile || "-";
        document.getElementById('infoAddress').innerText = order.Address || "-";
        document.getElementById('infoStatus').innerText = order.Status || "-";

        const isRoad = isRoadReceiveAddress(order.Address);
        document.getElementById('deliveryTypeBadgeWrap').innerHTML =
            `<span class="delivery-type-badge ${isRoad ? 'road' : ''}">
                ${isRoad ? '🚌 রোড রিসিভ ডেলিভারি' : '🏠 হোম ডেলিভারি'}
            </span>`;

        document.getElementById('orderInfoCard').style.display = 'block';
        document.getElementById('updateSection').style.display = 'block';
    }

    function renderStatusButtons(order) {
        const isRoad = isRoadReceiveAddress(order.Address);
        const statuses = isRoad ? ROAD_STATUSES : HOME_STATUSES;
        const currentStatusNorm = (order.Status || "").trim().toLowerCase();

        const wrap = document.getElementById('statusButtons');
        wrap.innerHTML = '';
        selectedStatusKey = null;
        isCancelSelected = false;
        document.getElementById('cancelBtn').classList.remove('selected');
        updateNoteLabel();
        updateConfirmState();

        statuses.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'status-btn';
            btn.type = 'button';
            btn.innerText = s.label;
            btn.dataset.key = s.key;
            if (s.key.toLowerCase() === currentStatusNorm) {
                btn.classList.add('current');
            }
            btn.addEventListener('click', () => selectStatus(s.key, btn));
            wrap.appendChild(btn);
        });
    }

    function selectStatus(key, btnEl) {
        isCancelSelected = false;
        document.getElementById('cancelBtn').classList.remove('selected');
        selectedStatusKey = key;
        document.querySelectorAll('#statusButtons .status-btn').forEach(b => b.classList.remove('selected'));
        btnEl.classList.add('selected');
        updateNoteLabel();
        updateConfirmState();
    }

    function selectCancel() {
        selectedStatusKey = null;
        document.querySelectorAll('#statusButtons .status-btn').forEach(b => b.classList.remove('selected'));
        isCancelSelected = !isCancelSelected;
        document.getElementById('cancelBtn').classList.toggle('selected', isCancelSelected);
        updateNoteLabel();
        updateConfirmState();
    }

    function updateNoteLabel() {
        const label = document.getElementById('noteLabel');
        const hint = document.getElementById('noteHint');
        if (isCancelSelected) {
            label.innerText = 'ক্যানসেলের কারণ';
            hint.innerText = 'কাস্টমারকে এই কারণটাই দেখানো হবে, লেখা ভালো করে দিন।';
        } else {
            label.innerText = 'অপশনাল নোট';
            hint.innerText = 'তারিখ ও সময় অটোমেটিক যুক্ত হয়ে যাবে, আলাদা করে লিখতে হবে না।';
        }
    }

    function updateConfirmState() {
        const btn = document.getElementById('confirmBtn');
        btn.disabled = !(selectedStatusKey || isCancelSelected);
    }

    function confirmUpdate() {
        if (!currentOrder) return;
        if (!selectedStatusKey && !isCancelSelected) return;

        const orderId = currentOrder["Order ID"];
        const note = document.getElementById('noteInput').value.trim();
        const now = new Date().toLocaleString('en-US', { hour12: true });

        let patchData;
        if (isCancelSelected) {
            patchData = {
                "Status": "Canceled",
                "CancelReason": note || "কোনো কারণ উল্লেখ করা হয়নি।",
                "Status Updated At": now
            };
        } else {
            patchData = {
                "Status": selectedStatusKey,
                "Status Updated At": now,
                "Status Note": note
            };
        }

        const confirmBtn = document.getElementById('confirmBtn');
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> আপডেট হচ্ছে...';

        const patchUrl = `${sheetdbAPI}/Order ID/${encodeURIComponent(orderId)}`;

        fetch(patchUrl, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: patchData })
        })
        .then(res => res.json())
        .then(result => {
            confirmBtn.innerHTML = 'আপডেট কনফার্ম করুন';
            if (result.updated >= 1) {
                showToast("স্ট্যাটাস সফলভাবে আপডেট হয়েছে!", "success");
                // লোকাল ভিউ রিফ্রেশ করার জন্য আবার সার্চ করা হলো
                currentOrder.Status = patchData["Status"];
                renderOrderInfo(currentOrder);
                renderStatusButtons(currentOrder);
                document.getElementById('noteInput').value = '';
            } else {
                showToast("আপডেট ব্যর্থ হয়েছে, আবার চেষ্টা করুন।", "error");
                confirmBtn.disabled = false;
            }
        })
        .catch(err => {
            console.error(err);
            confirmBtn.innerHTML = 'আপডেট কনফার্ম করুন';
            confirmBtn.disabled = false;
            showToast("নেটওয়ার্ক সমস্যা! আবার চেষ্টা করুন।", "error");
        });
    }

    function resetUI() {
        document.getElementById('orderInfoCard').style.display = 'none';
        document.getElementById('updateSection').style.display = 'none';
        document.getElementById('noteInput').value = '';
        currentOrder = null;
        selectedStatusKey = null;
        isCancelSelected = false;
    }

    function showToast(message, type) {
        const toast = document.getElementById('toastNotification');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');
        msg.innerText = message;
        icon.innerText = (type === 'error') ? '✕' : '✓';
        toast.className = 'toast show ' + (type || '');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3000);
    }
</script>
</body>
</html>
