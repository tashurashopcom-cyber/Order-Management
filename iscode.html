<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্ট কোড মেকার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #3f51b5;
            --secondary-color: #5c6bc0;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-color: #ccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(63, 81, 181, 0.2);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .specs-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-bottom: 15px;
        }
        
        .spec-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .spec-item input {
            flex-grow: 1;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn-add-spec {
            background-color: #4CAF50;
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
        }

        .btn-add-spec:hover {
            background-color: #45a049;
        }

        .btn-danger {
            background-color: #f44336;
        }
        .btn-danger:hover {
            background-color: #d32f2f;
        }

        /* History Section */
        .history-section {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s;
        }

        .history-item:hover {
            background-color: #f5f5f5;
        }

        .history-info {
            display: flex;
            flex-direction: column;
        }

        .history-title {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .history-code {
            font-size: 12px;
            color: #777;
        }

        .history-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-view { color: #2196F3; }
        .btn-view:hover { background-color: rgba(33, 150, 243, 0.1); }
        
        .btn-delete { color: #f44336; }
        .btn-delete:hover { background-color: rgba(244, 67, 54, 0.1); }

        /* Notepad Section */
        .notepad-section {
            width: 100%;
            max-width: 800px;
            background: #282c34;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .notepad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 10px;
        }

        .notepad-actions {
            display: flex;
            gap: 10px;
        }
        
        .notepad-actions button {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-copy { background-color: #4CAF50; color: white; }
        .btn-clear { background-color: #f44336; color: white; }

        textarea#outputCode {
            width: 100%;
            height: 300px;
            background-color: #1e2227;
            color: #abb2bf;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .required-star {
            color: red;
        }

        /* Product Type Toggle */
        .type-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4CAF50;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        #typeContainer {
            display: none;
        }

        .type-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .image-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .img-preview {
            display: none;
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #eee;
        }

        .img-preview.show {
            display: block;
        }

        .type-item input[type="text"] {
            flex-grow: 1;
        }

        .type-item input[type="color"] {
            width: 44px;
            height: 38px;
            padding: 2px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Image thumbnail row (uploaded links) */
        .img-thumb-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .img-thumb {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #eee;
        }

        .img-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-thumb .thumb-remove {
            position: absolute;
            top: 0; right: 0;
            background: rgba(244,67,54,0.9);
            color: white;
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 0 0 0 6px;
            cursor: pointer;
            font-size: 11px;
            line-height: 20px;
        }

        /* Live Preview Phone Card - mimics actual app product detail screen */
        .preview-wrap {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
        }

        .preview-phone {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 6px solid #111;
        }

        .preview-topbar {
            background: #000;
            color: white;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
        }

        .preview-detailsbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #222;
        }

        .preview-image-wrap {
            position: relative;
            width: 100%;
            height: 260px;
            background: #f1f1f1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .preview-image-wrap img.show {
            display: block;
        }

        .preview-noimg {
            color: #bbb;
            font-size: 48px;
        }

        .preview-noimg.hide {
            display: none;
        }

        .preview-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(120,120,120,0.6);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
        }

        .preview-arrow.left { left: 12px; }
        .preview-arrow.right { right: 12px; }

        .preview-dots {
            position: absolute;
            bottom: 10px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .preview-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
        }

        .preview-dots span.active {
            background: white;
        }

        .preview-body {
            padding: 16px;
        }

        .preview-body h4 {
            margin: 0 0 8px 0;
            font-size: 19px;
            font-weight: 800;
            color: #0D1B2A;
        }

        .preview-price {
            color: #E31E24;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 14px;
        }

        .preview-type-label {
            color: #b8742a;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .preview-type-select {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 14px;
            color: #aaa;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .preview-type-select span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-specs {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #444;
        }

        .preview-specs div {
            margin-bottom: 6px;
            color: #2e7d32;
        }

        .preview-body p {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .preview-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-top: 1px solid #eee;
        }

        .preview-code-box {
            font-size: 12px;
            color: #555;
        }

        .preview-addcart {
            background: linear-gradient(90deg, #ff9800, #ff5722);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-laptop-code"></i> প্রোডাক্ট কোড মেকার</h2>
        
        <form id="productForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>প্রোডাক্ট কোড <span class="required-star">*</span></label>
                    <input type="text" id="pCode" required placeholder="ideasshop-p1-27" oninput="updatePreview()">
                </div>
                
                <div class="form-group">
                    <label>প্রোডাক্টের নাম <span class="required-star">*</span></label>
                    <input type="text" id="pTitle" required placeholder="যেমন: কটন পোলো টি-শার্ট" oninput="updatePreview()">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>মূল্য <span class="required-star">*</span></label>
                    <input type="text" id="pPrice" required placeholder="যেমন: ৳৫৫০" oninput="updatePreview()">
                </div>
                
                <div class="form-group">
                    <label>ক্যাটাগরি <span class="required-star">*</span></label>
                    <select id="pCategory" required>
                        <option value="gents">Gents (জেন্টস)</option>
                        <option value="ladies">Ladies (লেডিস)</option>
                        <option value="electronics">Electronics (ইলেকট্রনিক্স)</option>
                        <option value="watch">Watch (ঘড়ি ও চশমা)</option>
                        <option value="decor">Decor (ডেকোরেশন)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>স্টোর আইডি</label>
                    <input type="text" id="pStoreId" value="store1" placeholder="store1">
                </div>
            </div>

            <div class="form-group">
                <label>ডেসক্রিপশন <span class="required-star">*</span></label>
                <textarea id="pDesc" rows="3" required placeholder="আরামদায়ক ও স্টাইলিশ...রচনা আকারে লিখতে হবে কোন ইন্টার দিয়ে ডিজাইন করা যাবে না" oninput="updatePreview()"></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-images"></i> ছবির লিংক (একটি দিয়ে + চাপুন, একাধিক যোগ করা যাবে)</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="imgUrlInput" placeholder="https://... ছবির লিংক পেস্ট করুন" onkeydown="if(event.key==='Enter'){event.preventDefault();addImage();}">
                    <button type="button" class="btn btn-add-spec" style="margin-top:0; flex-shrink:0;" onclick="addImage()"><i class="fas fa-plus"></i></button>
                </div>
                <div class="img-thumb-row" id="imgThumbRow"></div>
                <small style="color:#777; display:block; margin-top:5px;">প্রথম ২-৩টি ছবি আবশ্যক, বাকিগুলো ঐচ্ছিক।</small>
            </div>


            <div class="form-group">
                <label><i class="fas fa-list-ul"></i> স্পেসিফিকেশন</label>
                <div class="specs-group" id="specsContainer" oninput="updatePreview()">
                    <div class="spec-item">
                        <input type="text" class="spec-input" placeholder="যেমন: ✔ জিএসএম: ২১০+ হেভি কোয়ালিটি">
                        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="spec-item">
                        <input type="text" class="spec-input" placeholder="যেমন: ✔ সাইজ: M, L, XL">
                        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <button type="button" class="btn btn-add-spec" onclick="addSpecField()"><i class="fas fa-plus"></i> নতুন স্পেসিফিকেশন যোগ করুন</button>
            </div>

            <div class="form-group">
                <div class="type-header">
                    <label style="margin-bottom:0;"><i class="fas fa-tags"></i> প্রোডাক্ট টাইপ</label>
                    <label class="switch">
                        <input type="checkbox" id="typeToggle" onchange="toggleTypeContainer()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="specs-group" id="typeContainer">
                    <div class="type-item">
                        <input type="text" class="type-name-input" placeholder="যেমন: মেরুন">
                        <input type="color" class="type-color-input" value="#7f1d1d">
                        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="type-item">
                        <input type="text" class="type-name-input" placeholder="যেমন: কালো">
                        <input type="color" class="type-color-input" value="#000000">
                        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
                    </div>
                    <button type="button" class="btn btn-add-spec" onclick="addTypeField()"><i class="fas fa-plus"></i> নতুন টাইপ যোগ করুন</button>
                </div>
            </div>

            <button type="submit" class="btn"><i class="fas fa-cogs"></i> কোড জেনারেট করুন</button>
        </form>
    </div>

    <div class="preview-wrap">
        <h3 style="text-align:center; color: var(--primary-color); margin-bottom:15px;"><i class="fas fa-mobile-screen-button"></i> লাইভ প্রিভিউ</h3>
        <div class="preview-phone">
            <div class="preview-topbar">
                <span>Ideas SHOP - ক্যাটাগরি</span>
                <i class="fas fa-ellipsis-vertical"></i>
            </div>
            <div class="preview-detailsbar">
                <span>প্রোডাক্ট ডিটেইলস</span>
                <i class="fas fa-xmark"></i>
            </div>
            <div class="preview-image-wrap">
                <button type="button" class="preview-arrow left" onclick="prevPreviewImage()"><i class="fas fa-chevron-left"></i></button>
                <img id="previewMainImg" src="" alt="">
                <div id="previewNoImg" class="preview-noimg"><i class="fas fa-image"></i></div>
                <button type="button" class="preview-arrow right" onclick="nextPreviewImage()"><i class="fas fa-chevron-right"></i></button>
                <div class="preview-dots" id="previewDots"></div>
            </div>
            <div class="preview-body">
                <h4 id="previewTitle">প্রোডাক্টের নাম</h4>
                <div class="preview-price" id="previewPrice">৳০</div>
                <div class="preview-type-label"><i class="fas fa-tag"></i> PRODUCT TYPE</div>
                <div class="preview-type-select"><span><i class="fas fa-tag"></i> Select Type</span><i class="fas fa-chevron-down"></i></div>
                <div class="preview-specs" id="previewSpecs"></div>
                <p id="previewDesc"></p>
            </div>
            <div class="preview-footer">
                <div class="preview-code-box">
                    প্রোডাক্ট কোড:<br><b id="previewCode">-</b>
                </div>
                <button type="button" class="preview-addcart"><i class="fas fa-cart-shopping"></i> কার্টে যোগ করুন</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 10px; padding-bottom: 5px;">
            <h3 style="margin: 0; color: var(--primary-color);"><i class="fas fa-history"></i> প্রোডাক্ট হিস্ট্রি</h3>
            <button class="btn btn-danger" style="width: auto; padding: 5px 10px; font-size: 12px;" onclick="clearAllHistory()"><i class="fas fa-trash-alt"></i> সব মুছুন</button>
        </div>
        <ul class="history-list" id="historyList">
            </ul>
    </div>

    <div class="notepad-section">
        <div class="notepad-header">
            <h3 style="margin: 0;"><i class="fas fa-code"></i> আউটপুট কোড</h3>
            <div class="notepad-actions">
                <button class="btn-copy" onclick="copyCode()"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn-clear" onclick="clearNotepad()"><i class="fas fa-eraser"></i> Clear</button>
            </div>
        </div>
        <textarea id="outputCode" readonly placeholder="জেনারেট করা কোড এখানে দেখাবে..."></textarea>
    </div>

    <script>
        let productHistory = JSON.parse(localStorage.getItem('codeMakerHistory')) || [];
        let currentImages = []; // dynamic list of image URLs
        let previewIndex = 0;

        // Initialize History on load
        window.onload = function() {
            renderHistory();
            updatePreview();
        }

        // Add Spec Field dynamically
        function addSpecField() {
            const container = document.getElementById('specsContainer');
            const div = document.createElement('div');
            div.className = 'spec-item';
            div.innerHTML = `
                <input type="text" class="spec-input" placeholder="নতুন স্পেসিফিকেশন লিখুন">
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove(); updatePreview();"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
            updatePreview();
        }

        // ---- Image Add / Remove / Thumbnails ----
        function addImage() {
            const input = document.getElementById('imgUrlInput');
            const url = input.value.trim();
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('সঠিক ছবির লিংক দিন (http/https দিয়ে শুরু হতে হবে)');
                return;
            }
            currentImages.push(url);
            input.value = '';
            renderThumbnails();
            previewIndex = currentImages.length - 1;
            updatePreview();
        }

        function removeImage(idx) {
            currentImages.splice(idx, 1);
            if (previewIndex >= currentImages.length) previewIndex = Math.max(0, currentImages.length - 1);
            renderThumbnails();
            updatePreview();
        }

        function renderThumbnails() {
            const row = document.getElementById('imgThumbRow');
            row.innerHTML = '';
            currentImages.forEach((url, idx) => {
                const div = document.createElement('div');
                div.className = 'img-thumb';
                div.innerHTML = `
                    <img src="${url}" onerror="this.style.opacity=0.2" onclick="previewIndex=${idx}; updatePreviewImages();">
                    <button type="button" class="thumb-remove" onclick="removeImage(${idx})"><i class="fas fa-xmark"></i></button>
                `;
                row.appendChild(div);
            });
        }

        // ---- Live Preview Image Slider ----
        function updatePreviewImages() {
            const img = document.getElementById('previewMainImg');
            const noImg = document.getElementById('previewNoImg');
            const dots = document.getElementById('previewDots');

            if (currentImages.length === 0) {
                img.classList.remove('show');
                noImg.classList.remove('hide');
                dots.innerHTML = '';
                return;
            }

            noImg.classList.add('hide');
            img.src = currentImages[previewIndex];
            img.classList.add('show');
            img.onerror = function() { img.classList.remove('show'); };

            dots.innerHTML = '';
            currentImages.forEach((u, i) => {
                const dot = document.createElement('span');
                if (i === previewIndex) dot.classList.add('active');
                dots.appendChild(dot);
            });
        }

        function prevPreviewImage() {
            if (currentImages.length === 0) return;
            previewIndex = (previewIndex - 1 + currentImages.length) % currentImages.length;
            updatePreviewImages();
        }

        function nextPreviewImage() {
            if (currentImages.length === 0) return;
            previewIndex = (previewIndex + 1) % currentImages.length;
            updatePreviewImages();
        }

        // ---- Master Live Preview Updater (title/price/code/desc/specs) ----
        function updatePreview() {
            document.getElementById('previewTitle').textContent =
                document.getElementById('pTitle').value.trim() || 'প্রোডাক্টের নাম';
            document.getElementById('previewPrice').textContent =
                document.getElementById('pPrice').value.trim() || '৳০';
            document.getElementById('previewCode').textContent =
                document.getElementById('pCode').value.trim() || '-';
            document.getElementById('previewDesc').textContent =
                document.getElementById('pDesc').value.trim();

            const specsBox = document.getElementById('previewSpecs');
            specsBox.innerHTML = '';
            const specVals = [...document.querySelectorAll('.spec-input')].map(i => i.value.trim()).filter(Boolean);
            if (specVals.length) {
                specVals.forEach(s => {
                    const d = document.createElement('div');
                    d.textContent = s;
                    specsBox.appendChild(d);
                });
            }

            updatePreviewImages();
        }

        // Toggle Product Type Container
        function toggleTypeContainer() {
            const container = document.getElementById('typeContainer');
            const isOn = document.getElementById('typeToggle').checked;
            container.style.display = isOn ? 'block' : 'none';
        }

        // Add Type Field dynamically
        function addTypeField() {
            const container = document.getElementById('typeContainer');
            const addBtn = container.querySelector('.btn-add-spec');
            const div = document.createElement('div');
            div.className = 'type-item';
            div.innerHTML = `
                <input type="text" class="type-name-input" placeholder="যেমন: নীল">
                <input type="color" class="type-color-input" value="#3f51b5">
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
            `;
            container.insertBefore(div, addBtn);
        }

        // Form Submit Handler
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get Values
            const code = document.getElementById('pCode').value.trim();
            const title = document.getElementById('pTitle').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const category = document.getElementById('pCategory').value;
            const storeId = document.getElementById('pStoreId').value.trim();
            const desc = document.getElementById('pDesc').value.trim();

            // Get Images
            if (currentImages.length === 0) {
                alert('অন্তত একটি ছবির লিংক যোগ করুন!');
                return;
            }
            const images = currentImages.map(url => `"${url}"`);

            // Get Specs
            let specs = [];
            document.querySelectorAll('.spec-input').forEach(input => {
                if (input.value.trim()) {
                    specs.push(`"${input.value.trim()}"`);
                }
            });

            // Get Product Types (only if toggle is ON)
            const typeOn = document.getElementById('typeToggle').checked;
            let types = [];
            if (typeOn) {
                const names = document.querySelectorAll('.type-name-input');
                const colors = document.querySelectorAll('.type-color-input');
                names.forEach((input, i) => {
                    if (input.value.trim()) {
                        types.push(`{ name: "${input.value.trim()}", hex: "${colors[i].value}" }`);
                    }
                });
            }
            const typeLine = typeOn
                ? `\n    types: [\n        ${types.join(',\n        ')}\n    ],`
                : '';

            // Format Output Code
            const outputString = `{
    code: "${code}", 
    title: "${title}", 
    price: "${price}",
    images: [
        ${images.join(',\n        ')}
    ],
    desc: "${desc}",
    specs: [${specs.join(', ')}],${typeLine}
    category: "${category}", 
    storeId: "${storeId}"
},`;

            // Display in Notepad
            document.getElementById('outputCode').value = outputString;

            // Save to History
            const historyItem = {
                id: Date.now(),
                title: title,
                code: code,
                generatedCode: outputString
            };
            
            productHistory.unshift(historyItem); // Add to top
            localStorage.setItem('codeMakerHistory', JSON.stringify(productHistory));
            renderHistory();
            
            // Reset images list
            currentImages = [];
            previewIndex = 0;
            renderThumbnails();
            updatePreview();
            
            // Scroll down to the output section
            document.querySelector('.notepad-section').scrollIntoView({ behavior: 'smooth' });
        });

        // Render History List
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            if(productHistory.length === 0) {
                list.innerHTML = '<li style="text-align:center; padding: 20px; color: #888;">কোনো হিস্ট্রি নেই</li>';
                return;
            }

            productHistory.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="history-info">
                        <span class="history-title">${item.title}</span>
                        <span class="history-code">কোড: ${item.code}</span>
                    </div>
                    <div class="history-actions">
                        <button class="btn-view" onclick="viewHistoryItem(${index})" title="View Code"><i class="fas fa-eye"></i></button>
                        <button class="btn-delete" onclick="deleteHistoryItem(${index})" title="Delete"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // View History Item in Notepad
        function viewHistoryItem(index) {
            document.getElementById('outputCode').value = productHistory[index].generatedCode;
            document.querySelector('.notepad-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Delete Single History Item
        function deleteHistoryItem(index) {
            if(confirm('আপনি কি এই হিস্ট্রি ডিলিট করতে চান?')) {
                productHistory.splice(index, 1);
                localStorage.setItem('codeMakerHistory', JSON.stringify(productHistory));
                renderHistory();
            }
        }

        // Clear All History
        function clearAllHistory() {
            if(confirm('সব হিস্ট্রি মুছে ফেলতে চান?')) {
                productHistory = [];
                localStorage.removeItem('codeMakerHistory');
                renderHistory();
            }
        }

        // Copy Code to Clipboard
        function copyCode() {
            const output = document.getElementById('outputCode');
            if(output.value.trim() === '') {
                alert('কপি করার মতো কোনো কোড নেই!');
                return;
            }
            output.select();
            document.execCommand('copy');
            alert('কোড কপি করা হয়েছে!');
        }

        // Clear Notepad
        function clearNotepad() {
            document.getElementById('outputCode').value = '';
        }
    </script>
</body>
</html>
